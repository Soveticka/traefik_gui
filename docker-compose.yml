
services:
  traefik-gui-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traefik-gui-backend
    ports:
      - "3001:3001"
    volumes:
      - /opt/traefik/data/dynamic:/app/config
      - /opt/traefik/data/dynamic.yml:/app/dynamic.yml
      - /opt/traefik/data/traefik-gui-logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CONFIG_PATH=/app/config
      - DYNAMIC_FILE_PATH=/app/dynamic.yml
      - AUDIT_LOG_PATH=/app/logs/audit.log
      - ALLOW_UNAUTHENTICATED_API=${ALLOW_UNAUTHENTICATED_API:-true}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  traefik-gui-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traefik-gui-frontend
    ports:
      - "3000:80"
    depends_on:
      traefik-gui-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

volumes:
  config_data:
